name: Trigger auto deployment for sqlcurdcontainerapp

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/sqlcurdcontainerapp-AutoDeployTrigger-cb7b5d8a-3d6c-42a5-a3be-9636c71ae37d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SQLCURDCONTAINERAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SQLCURDCONTAINERAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SQLCURDCONTAINERAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.SQLCURDCONTAINERAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SQLCURDCONTAINERAPP_REGISTRY_PASSWORD }}
          containerAppName: sqlcurdcontainerapp
          resourceGroup: RitechGroup
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


